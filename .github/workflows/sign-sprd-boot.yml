name: 展讯UMS312 Legacy签名(无大小限制)

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: 'boot.img 直链'
        required: true
        type: string

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc wget git
          pip3 install pycryptodome

      - name: 下载 avb 工具
        run: |
          git clone https://android.googlesource.com/platform/external/avb avb

      - name: 下载 sprd 头工具
        run: |
          git clone https://github.com/affggh/sprd-tools.git
          cd sprd-tools/imgheaderinsert
          gcc -o imgheaderinsert imgheaderinsert.c
          sudo cp imgheaderinsert /usr/local/bin/

      - name: 下载 boot
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"

      - name: 签名 + 加展讯头
        run: |
          python3 avb/avbtool.py add_hash_footer \
            --image boot.img \
            --partition_name boot \
            --algorithm SHA256_RSA2048 \
            --key avb/test/data/rsa2048.pem \
            --output boot_signed.img

          imgheaderinsert boot_signed.img boot_final.img 0x200

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: boot_final
          path: boot_final.img
