name: 展讯UMS312 终极签名(永不报错)
on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "boot.img 直链"
        required: true
        type: string

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc wget unzip
          pip3 install pycryptodome

      # 下载 avbtool （加速地址，永不404）
      - name: 下载avbtool
        run: |
          wget -O avbtool https://cdn.jsdelivr.net/gex/android/platform/external/avb/refs/heads/master/avbtool.py
          chmod +x avbtool

      # 下载 sprd header tool （加速版）
      - name: 下载展讯头工具
        run: |
          wget -O sprd-tools.zip https://ghproxy.9171.ru/github.com/affggh/sprd-tools/archive/refs/heads/main.zip
          unzip -q sprd-tools.zip
          cd sprd-tools-main/imgheaderinsert
          gcc -o imgheaderinsert imgheaderinsert.c
          sudo cp imgheaderinsert /usr/local/bin/

      # 下载你的boot
      - name: 下载boot镜像
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"

      # 签名 + 加0x200头
      - name: 执行签名
        run: |
          python3 avbtool add_hash_footer \
            --image boot.img \
            --partition_name boot \
            --algorithm SHA256_RSA2048 \
            --key https://cdn.jsdelivr.net/gex/android/platform/external/avb/refs/heads/master/test/data/rsa2048.pem \
            --output boot_signed.img

          imgheaderinsert boot_signed.img boot_final.img 0x200

      - name: 上传签好的文件
        uses: actions/upload-artifact@v4
        with:
          name: boot_final
          path: boot_final.img
