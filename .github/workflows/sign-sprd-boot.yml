name: 展讯UMS312 完整签名(URL直链)

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: 'boot.img 下载链接（直链）'
        required: true
        type: string

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc wget unzip
          pip3 install avb pycryptodome

      - name: 下载展讯工具
        run: |
          git clone https://github.com/affggh/sprd-tools.git
          cd sprd-tools/imgheaderinsert
          gcc -o imgheaderinsert imgheaderinsert.c
          sudo cp imgheaderinsert /usr/local/bin/

      - name: 下载 boot.img
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"
          ls -lh boot.img

      - name: 签名boot
        run: |
          avb add_hash_footer \
            --image boot.img \
            --partition_name boot \
            --algorithm SHA256_RSA2048 \
            --key /usr/local/lib/python3.*/dist-packages/avb/test/data/rsa2048.pem \
            --output boot_signed_avb.img

          imgheaderinsert boot_signed_avb.img boot_signed_final.img 0x200

      - name: 上传签好的文件
        uses: actions/upload-artifact@v4
        with:
          name: boot_signed_final
          path: boot_signed_final.img
