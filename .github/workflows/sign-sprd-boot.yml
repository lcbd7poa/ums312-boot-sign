
name: 展讯UMS312完整签名(自动识别)

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y python3 python3-cryptography gcc git
          git clone https://github.com/android/platform-external_avb avb
          git clone https://github.com/affggh/sprd-tools.git sprd
          cd sprd/imgheaderinsert
          gcc -o imgheaderinsert imgheaderinsert.c
          sudo cp imgheaderinsert /usr/bin

      - name: 自动查找并签名boot
        run: |
          # 自动找 .img 文件（排除输出文件）
          INPUT=$(ls *.img 2>/dev/null | grep -v boot_signed | head -n1)
          if [ -z "$INPUT" ]; then
            echo "❌ 找不到 .img 文件"
            exit 1
          fi
          echo "✅ 签名文件: $INPUT"

          # AVB footer 签名
          python3 avb/avbtool.py add_hash_footer \
            --image $INPUT \
            --partition_name boot \
            --algorithm SHA256_RSA2048 \
            --key avb/test/data/rsa2048.pem \
            --output boot_signed_avb.img

          # 插入展讯头
          imgheaderinsert boot_signed_avb.img boot_signed_final.img 0x200

          echo "✅ 签名完成: boot_signed_final.img"

      - name: 上传签好的boot
        uses: actions/upload-artifact@v4
        with:
          name: boot_signed_final
          path: boot_signed_final.img
